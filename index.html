<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Orbital Age</title>
    <link rel="stylesheet" href="./src/styles.css" />
  </head>
  <body>
    <main class="app">
      <header class="app__header">
        <h1>Orbital Age Map</h1>
        <p>Enter your birthday to initialize the orbital scene.</p>
      </header>

      <section class="controls" aria-label="Birthday controls">
        <form id="birthday-form" novalidate>
          <label for="birthday">Birthday</label>
          <input id="birthday" name="birthday" type="date" required min="1900-01-01" max="2100-12-31" />
          <button type="submit">Render Orbit</button>
        </form>
        <div id="timeline-controls" class="timeline-controls timeline-controls--disabled" aria-label="Timeline controls">
          <div class="timeline-controls__buttons">
            <button id="timeline-step-back" type="button">-1 day</button>
            <button id="timeline-toggle-play" type="button">Pause</button>
            <button id="timeline-step-forward" type="button">+1 day</button>
          </div>
          <label for="timeline-scrubber">Timeline</label>
          <input id="timeline-scrubber" type="range" min="0" max="1000" value="0" step="1" />
          <p class="timeline-controls__meta">
            <span id="timeline-date">--</span>
          </p>
        </div>
        <p id="validation-message" class="message" aria-live="polite"></p>
        <fieldset id="timeline-controls" class="timeline" disabled>
          <legend>Timeline controls</legend>
          <div class="timeline__row">
            <button id="play-pause" type="button" aria-label="Play timeline">Play</button>
            <button id="reset-timeline" type="button">Reset</button>
            <label for="playback-speed">Speed</label>
            <select id="playback-speed" name="playback-speed">
              <option value="1">1x</option>
              <option value="10">10x</option>
              <option value="30" selected>30x</option>
              <option value="90">90x</option>
            </select>
          </div>
          <div class="timeline__row timeline__row--stack">
            <label for="date-scrubber">Date scrubber</label>
            <input
              id="date-scrubber"
              name="date-scrubber"
              type="range"
              min="0"
              max="0"
              value="0"
              step="1"
              aria-label="Timeline date scrubber"
            />
            <p id="timeline-status" class="message message--info" aria-live="polite">Enter a birthday to enable timeline controls.</p>
            <output id="timeline-date" for="date-scrubber">--</output>
          </div>
        </fieldset>
      </section>

      <section class="viewport">
        <canvas id="orbit-canvas" aria-label="Orbital map"></canvas>
        <p id="webgl-message" class="message message--hidden" aria-live="polite"></p>
      </section>
    </main>

    <script type="module" src="./src/main.js"></script>
  </body>
</html>
